<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Срећан Дан жена ❤️</title>
	<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>❤️</text></svg>">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Dancing+Script:wght@500&display=swap" rel="stylesheet">
</head>
<audio id="ljubavnaPesma" src="love.mp3"></audio>
<body>
    <div class="background"></div>
    <div class="hearts-container" id="heartsContainer"></div>
    
    <div class="main-content">
        <div class="gift-container" id="giftContainer">
            <img src="images/box.png" alt="Поклон" class="gift-box" id="giftBox">
        </div>
        
        <div class="letter-container hidden" id="letterContainer">
            <div class="letter">
                <div class="letter-content">
                    <p>Твој осмех је мој омиљени поглед,</p>
                    <p>твој загрљај моје најсигурније место.</p>
                    <p class="signature">Срећан Дан жена, љубави мог живота.</p>
                </div>
            </div>
            <img src="images/unbox.png" alt="Отворен поклон" class="unboxed" id="unboxedGift">
        </div>
    </div>
    
    <div class="click-hint" id="clickHint">Кликни на поклон 💝</div>
    
    <script src="script.js"></script>
</body>
</html>
